<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB 2026 • PDX Season Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .game-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .game-card:hover { transform: translateY(-1px); }
        .filter-chip { transition: all 0.2s; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <header class="border-b border-zinc-800 bg-black sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-8 h-8 bg-[#d93b2e] rounded-2xl flex items-center justify-center text-white text-2xl">⚾</div>
                <h1 class="title-font text-3xl tracking-tighter">MLB 2026 • PDX</h1>
            </div>
            <div onclick="refreshAll()" class="text-sm px-4 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-3xl cursor-pointer">Refresh season</div>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto px-6 py-6">
        <h2 class="title-font text-4xl tracking-tighter mb-1">Full remaining season</h2>
        <p class="text-zinc-400 text-sm mb-6">Saturdays • PDX round-trip • 3h buffers • 3-letter matchups</p>

        <!-- FILTER BAR -->
        <div class="mb-8">
            <div class="flex flex-wrap gap-2" id="filter-bar">
                <!-- Populated by JS -->
            </div>
        </div>

        <div id="season-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

        <div id="empty-state" class="hidden text-center py-16 text-zinc-400">No games match your filters.</div>
    </div>

    <script>
        const TEAM_ABBR = {
            "Baltimore Orioles": "BAL", "Boston Red Sox": "BOS", "New York Yankees": "NYY",
            "Tampa Bay Rays": "TB", "Toronto Blue Jays": "TOR",
            "Chicago White Sox": "CWS", "Cleveland Guardians": "CLE", "Detroit Tigers": "DET",
            "Kansas City Royals": "KC", "Minnesota Twins": "MIN",
            "Houston Astros": "HOU", "Los Angeles Angels": "LAA", "Oakland Athletics": "OAK",
            "Seattle Mariners": "SEA", "Texas Rangers": "TEX",
            "Atlanta Braves": "ATL", "Miami Marlins": "MIA", "New York Mets": "NYM",
            "Philadelphia Phillies": "PHI", "Washington Nationals": "WSH",
            "Chicago Cubs": "CHC", "Cincinnati Reds": "CIN", "Milwaukee Brewers": "MIL",
            "Pittsburgh Pirates": "PIT", "St. Louis Cardinals": "STL",
            "Arizona Diamondbacks": "ARI", "Colorado Rockies": "COL", "Los Angeles Dodgers": "LAD",
            "San Diego Padres": "SD", "San Francisco Giants": "SF"
        };

        const TEAM_AIRPORT_MAP = { /* same as before */ 
            "Baltimore Orioles": {code: "BWI", city: "Baltimore"}, "Boston Red Sox": {code: "BOS", city: "Boston"},
            "New York Yankees": {code: "JFK", city: "New York"}, "Tampa Bay Rays": {code: "TPA", city: "Tampa"},
            "Toronto Blue Jays": {code: "YYZ", city: "Toronto"}, "Chicago White Sox": {code: "ORD", city: "Chicago"},
            "Cleveland Guardians": {code: "CLE", city: "Cleveland"}, "Detroit Tigers": {code: "DTW", city: "Detroit"},
            "Kansas City Royals": {code: "MCI", city: "Kansas City"}, "Minnesota Twins": {code: "MSP", city: "Minneapolis"},
            "Houston Astros": {code: "IAH", city: "Houston"}, "Los Angeles Angels": {code: "SNA", city: "Anaheim"},
            "Oakland Athletics": {code: "OAK", city: "Oakland"}, "Seattle Mariners": {code: "SEA", city: "Seattle"},
            "Texas Rangers": {code: "DFW", city: "Arlington"}, "Atlanta Braves": {code: "ATL", city: "Atlanta"},
            "Miami Marlins": {code: "MIA", city: "Miami"}, "New York Mets": {code: "JFK", city: "New York"},
            "Philadelphia Phillies": {code: "PHL", city: "Philadelphia"}, "Washington Nationals": {code: "DCA", city: "Washington"},
            "Chicago Cubs": {code: "ORD", city: "Chicago"}, "Cincinnati Reds": {code: "CVG", city: "Cincinnati"},
            "Milwaukee Brewers": {code: "MKE", city: "Milwaukee"}, "Pittsburgh Pirates": {code: "PIT", city: "Pittsburgh"},
            "St. Louis Cardinals": {code: "STL", city: "St. Louis"}, "Arizona Diamondbacks": {code: "PHX", city: "Phoenix"},
            "Colorado Rockies": {code: "DEN", city: "Denver"}, "Los Angeles Dodgers": {code: "LAX", city: "Los Angeles"},
            "San Diego Padres": {code: "SAN", city: "San Diego"}, "San Francisco Giants": {code: "SFO", city: "San Francisco"}
        };

        const PDX_FLIGHT_DURATIONS = { /* same as before */ 
            "BWI":5.5,"BOS":5.5,"JFK":5.5,"TPA":6,"YYZ":5,"ORD":4,"CLE":5,"DTW":4.5,
            "MCI":3.5,"MSP":3.5,"IAH":4,"SNA":2.5,"OAK":1.5,"SEA":1,"DFW":4,
            "ATL":5,"MIA":6,"PHL":5.5,"DCA":5.5,"CVG":4.5,"MKE":4,"PIT":5,"STL":4,
            "PHX":2.5,"DEN":2.5,"LAX":2.5,"SAN":2.5,"SFO":1.5
        };

        let allGames = [];
        let activeFilters = new Set(); // home team full names that are ALLOWED

        async function fetchMLBGames(dateStr) {
            try {
                const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`);
                const data = await res.json();
                return data.dates?.[0]?.games || [];
            } catch { return []; }
        }

        function toET(dateUTC) { return new Date(dateUTC).toLocaleString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true}) + " ET"; }
        function toPT(dateUTC) { return new Date(dateUTC).toLocaleString('en-US',{timeZone:'America/Los_Angeles',hour:'numeric',minute:'2-digit',hour12:true}) + " PT"; }

        function getAllSaturdays() {
            const dates = [];
            let current = new Date("2026-04-25"); // first Saturday after today
            const seasonEnd = new Date("2026-09-27");
            while (current <= seasonEnd) {
                const yyyy = current.getFullYear();
                const mm = String(current.getMonth()+1).padStart(2,'0');
                const dd = String(current.getDate()).padStart(2,'0');
                dates.push({display: current.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'}), value: `${yyyy}-${mm}-${dd}`});
                current.setDate(current.getDate() + 7);
            }
            return dates;
        }

        function calculatePDXDeparture(gameStartUTC, durationHours) {
            const arriveByUTC = new Date(gameStartUTC.getTime() - 3*3600000);
            const depUTC = new Date(arriveByUTC.getTime() - (durationHours*3600000) - 3600000); // 1h airport buffer
            return toPT(depUTC);
        }

        async function loadFullSeason() {
            const container = document.getElementById('season-container');
            container.innerHTML = '<div class="col-span-full text-center py-12 text-zinc-400">Loading full 2026 season…</div>';
            
            const saturdays = getAllSaturdays();
            const promises = saturdays.map(sat => fetchMLBGames(sat.value).then(games => ({date: sat, games})));
            const results = await Promise.all(promises);
            
            allGames = [];
            results.forEach(({date, games}) => {
                games.forEach(game => {
                    const homeTeam = game.teams.home.team.name;
                    if (TEAM_ABBR[homeTeam]) {
                        allGames.push({date, game, homeTeam});
                    }
                });
            });

            renderSeason();
            buildFilterBar();
        }

        function buildFilterBar() {
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = `<button onclick="resetFilters()" class="px-4 py-1 text-xs bg-emerald-400 text-emerald-950 rounded-3xl font-medium">All ballparks</button>`;
            
            // unique home teams
            const uniqueHomes = [...new Set(allGames.map(g => g.homeTeam))].sort();
            uniqueHomes.forEach(team => {
                const abbr = TEAM_ABBR[team];
                const chip = document.createElement('button');
                chip.className = `filter-chip px-4 py-1 text-xs border border-zinc-700 hover:border-white rounded-3xl ${activeFilters.has(team) ? 'bg-white text-zinc-950' : 'bg-transparent'}`;
                chip.textContent = `${abbr} ${TEAM_AIRPORT_MAP[team].city}`;
                chip.onclick = () => toggleFilter(team, chip);
                bar.appendChild(chip);
            });
        }

        function toggleFilter(team, chip) {
            if (activeFilters.has(team)) {
                activeFilters.delete(team);
                chip.classList.remove('bg-white','text-zinc-950');
            } else {
                activeFilters.add(team);
                chip.classList.add('bg-white','text-zinc-950');
            }
            renderSeason();
        }

        function resetFilters() {
            activeFilters.clear();
            buildFilterBar();
            renderSeason();
        }

        function renderSeason() {
            const container = document.getElementById('season-container');
            container.innerHTML = '';
            
            let currentDate = '';
            const filtered = allGames.filter(item => {
                if (activeFilters.size === 0) return true;
                return activeFilters.has(item.homeTeam);
            });

            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }
            document.getElementById('empty-state').classList.add('hidden');

            filtered.forEach(({date, game}) => {
                const homeTeam = game.teams.home.team.name;
                const awayTeam = game.teams.away.team.name;
                const dest = TEAM_AIRPORT_MAP[homeTeam];
                const abbrHome = TEAM_ABBR[homeTeam];
                const abbrAway = TEAM_ABBR[awayTeam] || awayTeam.substring(0,3).toUpperCase();
                const gameStartUTC = new Date(game.gameDate);
                const gameET = toET(game.gameDate);
                const duration = PDX_FLIGHT_DURATIONS[dest.code] || 4;
                const arriveByPT = toPT(new Date(gameStartUTC.getTime() - 3*3600000));
                const gameEnd = new Date(gameStartUTC.getTime() + 3*3600000);
                const departAfterPT = toPT(new Date(gameEnd.getTime() + 3*3600000));
                const leavePDXPT = calculatePDXDeparture(gameStartUTC, duration);
                const gameDateStr = date.value;

                const googleLink = `https://www.google.com/travel/flights?q=Flights%20to%20${dest.code}%20from%20PDX%20on%20${gameDateStr}%20through%20${gameDateStr}`;
                const expediaLink = `https://www.expedia.com/Flights-Search?trip=roundtrip&leg1=from:PDX,to:${dest.code},departure:${gameDateStr}TANYT&leg2=from:${dest.code},to:PDX,departure:${gameDateStr}TANYT&mode=search`;

                // date header if new Saturday
                if (date.display !== currentDate) {
                    currentDate = date.display;
                    const header = document.createElement('div');
                    header.className = 'col-span-full text-lg font-medium text-zinc-400 mt-8 mb-3';
                    header.textContent = currentDate;
                    container.appendChild(header);
                }

                const cardHTML = `
                <div class="game-card bg-zinc-900 rounded-3xl p-5 border border-zinc-800 text-sm">
                    <div class="flex justify-between items-start mb-3">
                        <div class="font-medium">${abbrAway} @ ${abbrHome}</div>
                        <div class="text-right text-xs text-zinc-400">${dest.city}</div>
                    </div>
                    <div class="text-[#d93b2e] font-semibold mb-4">${gameET}</div>
                    
                    <div class="text-xs space-y-2 text-zinc-400 mb-5">
                        <div>Arrive by <span class="text-white">${arriveByPT}</span></div>
                        <div>Leave PDX by <span class="text-white">${leavePDXPT}</span> (~${duration}h)</div>
                        <div>Leave ${dest.city} after <span class="text-white">${departAfterPT}</span> (~${duration}h)</div>
                        <div class="text-emerald-400 text-[10px]">Preferred Saturday-night return</div>
                    </div>

                    <div class="flex justify-between text-[10px] text-zinc-400 border-t border-zinc-800 pt-3">
                        <a href="${googleLink}" target="_blank" class="underline hover:text-white">Google Flights</a>
                        <a href="${expediaLink}" target="_blank" class="underline hover:text-white">Expedia</a>
                    </div>

                    <div class="mt-4 flex items-center text-xs">
                        <span class="text-zinc-400">price found: $</span>
                        <input type="text" class="price-input bg-transparent border-b border-zinc-700 focus:border-white w-16 text-center mx-2 outline-none text-sm" placeholder="___">
                        <span onclick="savePrice(this)" class="text-emerald-400 cursor-pointer underline text-xs">save</span>
                        <span class="saved-price ml-3 font-medium text-emerald-400 hidden"></span>
                    </div>
                </div>`;
                container.innerHTML += cardHTML;
            });
        }

        function savePrice(el) {
            const input = el.parentElement.querySelector('.price-input');
            const saved = el.parentElement.querySelector('.saved-price');
            if (input.value.trim()) {
                input.classList.add('hidden');
                saved.textContent = '$' + input.value.trim();
                saved.classList.remove('hidden');
            }
        }

        async function refreshAll() {
            await loadFullSeason();
        }

        window.onload = () => {
            loadFullSeason();
        };
    </script>
</body>
</html>
