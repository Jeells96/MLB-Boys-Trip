<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ PDX → Saturday MLB</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --card: #161b22;
    --border: #21262d;
    --accent: #e8c56a;
    --accent2: #5ca8ff;
    --green: #3fb68c;
    --red: #ff5f57;
    --text: #e6edf3;
    --muted: #7d8590;
    --chip: #1c2128;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

/* ── HEADER ── */
.header {
background: #0d1117;
border-bottom: 1px solid var(–border);
padding: 10px 12px 8px;
position: sticky;
top: 0;
z-index: 100;
}
.header-top {
display: flex;
align-items: center;
margin-bottom: 8px;
}
.logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 1px;
color: var(–accent);
line-height: 1;
}
.logo span { color: var(–text); }
.subtitle {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
letter-spacing: 0.4px;
}
.status-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–muted);
margin-left: auto;
flex-shrink: 0;
}
.status-dot.loading { background: var(–accent); animation: pulse 1s infinite; }
.status-dot.ready   { background: var(–green); }
.status-dot.error   { background: var(–red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── FILTER BAR ── */
.filter-hint {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
margin-bottom: 5px;
letter-spacing: 0.3px;
}
.filter-hint em { color: var(–accent2); font-style: normal; }
.filter-wrap {
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-bar {
display: flex;
gap: 4px;
padding-bottom: 2px;
white-space: nowrap;
align-items: center;
}
.chip {
background: var(–chip);
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
padding: 3px 8px;
border-radius: 20px;
cursor: pointer;
transition: all 0.12s;
user-select: none;
letter-spacing: 0.3px;
flex-shrink: 0;
}
.chip:active { transform: scale(0.94); }
.chip.active {
background: var(–accent);
border-color: var(–accent);
color: #000;
font-weight: 600;
}
.chip.all.active {
background: var(–accent2);
border-color: var(–accent2);
color: #000;
}
.divider-pill {
width: 1px; height: 14px;
background: var(–border);
flex-shrink: 0;
margin: 0 2px;
}

/* ── MAIN ── */
main { padding: 8px 8px 40px; }

/* ── DATE DIVIDER ── */
.date-divider {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 12px;
letter-spacing: 2px;
color: var(–muted);
padding: 12px 2px 5px;
border-bottom: 1px solid var(–border);
margin-bottom: 6px;
}
.date-divider span { color: var(–accent); margin-right: 5px; }

/* ── 3-COLUMN GRID ── */
.games-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 5px;
margin-bottom: 2px;
}

/* ── GAME CARD ── */
.game-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 8px;
overflow: hidden;
display: flex;
flex-direction: column;
cursor: pointer;
transition: border-color 0.12s;
-webkit-tap-highlight-color: transparent;
}
.game-card:active { border-color: var(–accent); }

.card-head { padding: 6px 7px 4px; }
.matchup {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 13px;
letter-spacing: 0.8px;
line-height: 1;
color: var(–text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.card-meta {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–muted);
margin-top: 2px;
line-height: 1.4;
}
.card-meta strong { color: var(–text); font-weight: 500; }

/* Flight + Expedia row */
.card-flight {
display: flex;
align-items: center;
justify-content: space-between;
padding: 3px 7px 3px;
border-top: 1px solid var(–border);
gap: 3px;
}
.flight-badge {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–accent2);
white-space: nowrap;
}
.expedia-btn {
display: inline-flex;
align-items: center;
background: var(–accent);
color: #000;
font-family: ‘DM Mono’, monospace;
font-size: 8px;
font-weight: 700;
padding: 2px 5px;
border-radius: 4px;
text-decoration: none;
white-space: nowrap;
letter-spacing: 0.2px;
flex-shrink: 0;
}
.expedia-btn:active { opacity: 0.75; }

/* Timing rows */
.card-timing {
border-top: 1px solid var(–border);
padding: 4px 7px;
display: flex;
flex-direction: column;
gap: 2px;
}
.t-row {
display: flex;
justify-content: space-between;
align-items: baseline;
gap: 2px;
}
.t-label {
font-family: ‘DM Mono’, monospace;
font-size: 7.5px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.3px;
white-space: nowrap;
flex-shrink: 0;
}
.t-val {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
font-weight: 500;
text-align: right;
white-space: nowrap;
}
.t-val.y { color: var(–accent); }
.t-val.g { color: var(–green); }
.t-val.r { color: var(–red); }

/* Price row */
.card-price {
border-top: 1px solid var(–border);
padding: 3px 7px 4px;
display: flex;
align-items: center;
gap: 3px;
}
.p-label {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
}
.p-input {
background: transparent;
border: none;
border-bottom: 1px solid var(–border);
color: var(–accent);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
font-weight: 500;
width: 100%;
outline: none;
padding: 1px 2px;
transition: border-color 0.12s;
}
.p-input:focus { border-bottom-color: var(–accent); }
.p-input::placeholder { color: #2a3140; }

/* States */
.loading-state, .empty-state, .error-state {
text-align: center;
padding: 50px 20px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
}
.error-state { color: var(–red); }
.game-count {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
padding: 4px 2px 2px;
}

/* ── MODAL ── */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.72);
z-index: 200;
align-items: flex-end;
justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
background: #161b22;
border: 1px solid var(–border);
border-bottom: none;
border-radius: 18px 18px 0 0;
padding: 18px 20px 38px;
width: 100%;
max-width: 480px;
animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle {
width: 36px; height: 4px;
background: var(–border);
border-radius: 2px;
margin: 0 auto 16px;
}
.modal-matchup {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 30px;
letter-spacing: 2px;
color: var(–text);
margin-bottom: 2px;
}
.modal-sub {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-bottom: 14px;
}
.modal-timing {
background: #1c2128;
border-radius: 10px;
padding: 10px 14px;
margin-bottom: 14px;
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 10px;
}
.mt-item { display: flex; flex-direction: column; gap: 3px; }
.mt-label { font-family:‘DM Mono’,monospace; font-size:8px; color:var(–muted); text-transform:uppercase; letter-spacing:.4px; }
.mt-val   { font-family:‘DM Mono’,monospace; font-size:12px; font-weight:500; }
.mt-val.y { color:var(–accent); }
.mt-val.g { color:var(–green); }
.mt-val.r { color:var(–red); }
.modal-expedia-btn {
display: block;
background: var(–accent);
color: #000;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
letter-spacing: 1.5px;
text-align: center;
padding: 13px 16px;
border-radius: 12px;
text-decoration: none;
margin-bottom: 8px;
transition: opacity 0.12s;
}
.modal-expedia-btn:active { opacity: 0.8; }
.modal-link-note {
text-align: center;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–muted);
margin-bottom: 16px;
}
.modal-close {
display: block;
text-align: center;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
cursor: pointer;
padding: 8px;
border: 1px solid var(–border);
border-radius: 8px;
}
</style>

</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">⚾ <span>PDX</span> → MLB</div>
      <div class="subtitle">SATURDAY GAMES · ROUND TRIP FROM PORTLAND</div>
    </div>
    <div class="status-dot loading" id="statusDot"></div>
  </div>
  <div class="filter-hint">FILTER BY CITY · <em>TAP MULTIPLE TO COMBINE</em></div>
  <div class="filter-wrap">
    <div class="filter-bar" id="filterBar">
      <div class="chip all active" id="allChip">All</div>
      <div class="divider-pill"></div>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading-state">⚾ Loading Saturday games…</div>
</main>

<!-- Modal -->

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-matchup" id="mMatchup"></div>
    <div class="modal-sub" id="mSub"></div>
    <div class="modal-timing" id="mTiming"></div>
    <a class="modal-expedia-btn" id="mLink" href="#" target="_blank" rel="noopener">
      ✈ SEARCH FLIGHTS ON EXPEDIA ↗
    </a>
    <div class="modal-link-note">PDX → destination · Round-trip · Outbound &amp; return same Saturday</div>
    <div class="modal-close" onclick="closeModal()">CLOSE</div>
  </div>
</div>

<script>
// ─── TEAM DATA ─────────────────────────────────────────────────────────────────
const TEAM_INFO = {
  109: ['ARI', 'Phoenix',      'America/Phoenix',     'PHX', 2.5],
  144: ['ATL', 'Atlanta',      'America/New_York',    'ATL', 5.5],
  110: ['BAL', 'Baltimore',    'America/New_York',    'BWI', 5.5],
  111: ['BOS', 'Boston',       'America/New_York',    'BOS', 6.0],
  112: ['CHC', 'Chicago',      'America/Chicago',     'ORD', 4.5],
  145: ['CWS', 'Chicago',      'America/Chicago',     'MDW', 4.5],
  113: ['CIN', 'Cincinnati',   'America/New_York',    'CVG', 5.0],
  114: ['CLE', 'Cleveland',    'America/New_York',    'CLE', 5.0],
  115: ['COL', 'Denver',       'America/Denver',      'DEN', 2.5],
  116: ['DET', 'Detroit',      'America/New_York',    'DTW', 5.0],
  117: ['HOU', 'Houston',      'America/Chicago',     'IAH', 4.0],
  118: ['KC',  'Kansas City',  'America/Chicago',     'MCI', 4.0],
  108: ['LAA', 'Los Angeles',  'America/Los_Angeles', 'SNA', 2.0],
  119: ['LAD', 'Los Angeles',  'America/Los_Angeles', 'LAX', 2.0],
  158: ['MIL', 'Milwaukee',    'America/Chicago',     'MKE', 4.5],
  142: ['MIN', 'Minneapolis',  'America/Chicago',     'MSP', 3.5],
  121: ['NYM', 'New York',     'America/New_York',    'LGA', 5.5],
  147: ['NYY', 'New York',     'America/New_York',    'EWR', 5.5],
  133: ['OAK', 'Oakland',      'America/Los_Angeles', 'OAK', 1.5],
  143: ['PHI', 'Philadelphia', 'America/New_York',    'PHL', 5.5],
  134: ['PIT', 'Pittsburgh',   'America/New_York',    'PIT', 5.0],
  135: ['SD',  'San Diego',    'America/Los_Angeles', 'SAN', 2.5],
  137: ['SF',  'San Francisco','America/Los_Angeles', 'SFO', 1.5],
  136: ['SEA', 'Seattle',      'America/Los_Angeles', 'SEA', 0.75],
  138: ['STL', 'St. Louis',    'America/Chicago',     'STL', 4.5],
  139: ['TB',  'Tampa Bay',    'America/New_York',    'TPA', 5.5],
  140: ['TEX', 'Dallas',       'America/Chicago',     'DFW', 4.0],
  141: ['TOR', 'Toronto',      'America/Toronto',     'YYZ', 5.5],
  120: ['WSH', 'Washington',   'America/New_York',    'DCA', 5.5],
  146: ['MIA', 'Miami',        'America/New_York',    'MIA', 6.0],
};
function getTeamInfo(id) {
  return TEAM_INFO[id] || ['???', 'Unknown', 'America/Los_Angeles', 'LAX', 5.0];
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function addHours(date, h) { return new Date(date.getTime() + h * 3600000); }
function toTZ(date, tz) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true
  }).format(date);
}
function formatShortDate(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function expediaURL(iata, dateStr) {
  const [y,m,d] = dateStr.split('-');
  const dep = `${y}-${m}-${d}`;
  return `https://www.expedia.com/Flights-Search?trip=roundtrip&leg1=from%3APDX%2Cto%3A${iata}%2Cdeparture%3A${dep}TANYT&leg2=from%3A${iata}%2Cto%3APDX%2Cdeparture%3A${dep}TANYT&passengers=adults%3A1&mode=search`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(matchup, dateLabel, leavePDX, arriveby, leaveCity, flightStr, expUrl) {
  document.getElementById('mMatchup').textContent = matchup;
  document.getElementById('mSub').textContent = `SAT · ${dateLabel} · ✈ PDX ${flightStr}`;
  document.getElementById('mLink').href = expUrl;
  document.getElementById('mTiming').innerHTML = `
    <div class="mt-item"><div class="mt-label">Leave PDX by</div><div class="mt-val y">${leavePDX} PT</div></div>
    <div class="mt-item"><div class="mt-label">Arrive by</div><div class="mt-val g">${arriveby}</div></div>
    <div class="mt-item"><div class="mt-label">Leave after</div><div class="mt-val r">${leaveCity}</div></div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ─── SEASON END DATE ──────────────────────────────────────────────────────────
async function getSeasonEndDate(year) {
  try {
    const r = await fetch(`https://statsapi.mlb.com/api/v1/seasons/${year}?sportId=1`);
    const d = await r.json();
    if (d.seasons?.[0]?.regularSeasonEndDate) return d.seasons[0].regularSeasonEndDate;
  } catch(e) {}
  const d = new Date(`${year}-09-30T12:00:00Z`);
  while (d.getUTCDay() !== 0) d.setUTCDate(d.getUTCDate()-1);
  return d.toISOString().split('T')[0];
}

// ─── FETCH GAMES ──────────────────────────────────────────────────────────────
async function fetchSaturdayGames() {
  const today = new Date();
  const year  = today.getFullYear();
  const todayStr = today.toISOString().split('T')[0];
  const endDate  = await getSeasonEndDate(year);

  const saturdays = [];
  let cur = new Date(todayStr + 'T12:00:00Z');
  const end = new Date(endDate + 'T12:00:00Z');
  while (cur.getUTCDay() !== 6) cur = addHours(cur, 24);
  while (cur <= end) {
    saturdays.push(cur.toISOString().split('T')[0]);
    cur = addHours(cur, 7*24);
  }
  if (!saturdays.length) return [];

  const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&season=${year}&startDate=${saturdays[0]}&endDate=${endDate}&gameType=R&hydrate=team`;
  const resp = await fetch(url);
  const data = await resp.json();
  const satSet = new Set(saturdays);
  const games = [];
  for (const dateObj of (data.dates || [])) {
    if (!satSet.has(dateObj.date)) continue;
    for (const game of dateObj.games) {
      if (game.gameType !== 'R') continue;
      if (game.status?.abstractGameState === 'Final') continue;
      games.push({ date: dateObj.date, game });
    }
  }
  return games;
}

// ─── BUILD CARD ───────────────────────────────────────────────────────────────
function buildCard(dateStr, game) {
  const away = game.teams?.away?.team;
  const home = game.teams?.home?.team;
  if (!away || !home) return null;

  const [awayCode] = getTeamInfo(away.id);
  const [homeCode, homeCity, homeTZ, homeIATA, flightHours] = getTeamInfo(home.id);

  let gameStartUTC = null, startDisplay = 'TBD';
  if (game.gameDate) {
    gameStartUTC = new Date(game.gameDate);
    startDisplay = toTZ(gameStartUTC, homeTZ);
  }

  let leavePDX = '—', arriveby = '—', leaveCity = '—';
  if (gameStartUTC) {
    const arrTime = addHours(gameStartUTC, -3);
    arriveby  = toTZ(arrTime, homeTZ);
    leavePDX  = toTZ(addHours(arrTime, -(flightHours+1)), 'America/Los_Angeles');
    leaveCity = toTZ(addHours(gameStartUTC, 6), homeTZ);
  }

  const flightStr = flightHours < 1 ? `~${Math.round(flightHours*60)}m` : `~${flightHours}h`;
  const expUrl    = expediaURL(homeIATA, dateStr);
  const matchup   = `${awayCode}@${homeCode}`;
  const matchupFull = `${awayCode} @ ${homeCode}`;
  const inputId   = `price-${game.gamePk}`;
  const dateLabel = formatShortDate(dateStr);
  let savedPrice  = '';
  try { savedPrice = localStorage.getItem(inputId) || ''; } catch(e) {}

  // Inline card (small)
  const html = `
    <div class="game-card"
      onclick="openModal('${matchupFull}','${dateLabel}','${leavePDX}','${arriveby}','${leaveCity}','${flightStr}','${expUrl}')">
      <div class="card-head">
        <div class="matchup">${matchup}</div>
        <div class="card-meta"><strong>${homeCity}</strong><br>${startDisplay}</div>
      </div>
      <div class="card-flight">
        <span class="flight-badge">✈${flightStr}</span>
        <a class="expedia-btn" href="${expUrl}" target="_blank" rel="noopener"
          onclick="event.stopPropagation()">$$</a>
      </div>
      <div class="card-timing">
        <div class="t-row"><span class="t-label">LvPDX</span><span class="t-val y">${leavePDX}</span></div>
        <div class="t-row"><span class="t-label">Arrv</span><span class="t-val g">${arriveby}</span></div>
        <div class="t-row"><span class="t-label">Rtrn</span><span class="t-val r">${leaveCity}</span></div>
      </div>
      <div class="card-price">
        <span class="p-label">$</span>
        <input class="p-input" type="text" inputmode="decimal" placeholder="price"
          value="${savedPrice}"
          onclick="event.stopPropagation()"
          onchange="savePrice('${inputId}',this.value)">
      </div>
    </div>`;

  return { homeCity, html };
}

function savePrice(key, val) { try { localStorage.setItem(key, val); } catch(e){} }

// ─── FILTER STATE (multi-select by homeCity) ──────────────────────────────────
let allGames = [];
let selectedCities = new Set();

function render() {
  const main = document.getElementById('main');
  const isAll = selectedCities.size === 0;
  const filtered = isAll ? allGames : allGames.filter(g => selectedCities.has(g.homeCity));

  if (!filtered.length) {
    main.innerHTML = `<div class="empty-state">No games match the selected cities.</div>`;
    return;
  }

  const byDate = {};
  for (const g of filtered) {
    (byDate[g.date] = byDate[g.date] || []).push(g);
  }

  let html = `<div class="game-count">${filtered.length} GAME${filtered.length!==1?'S':''} · ${Object.keys(byDate).length} SAT</div>`;
  for (const [date, games] of Object.entries(byDate)) {
    html += `<div class="date-divider"><span>SAT</span>${formatShortDate(date)}</div>`;
    html += `<div class="games-grid">`;
    for (const g of games) html += g.html;
    html += `</div>`;
  }
  main.innerHTML = html;
}

function buildFilterChips(cities) {
  const bar = document.getElementById('filterBar');
  const allChip = document.getElementById('allChip');

  // Remove any previous city chips + divider
  [...bar.querySelectorAll('.chip:not(.all), .divider-pill')].forEach(el => el.remove());

  const div = document.createElement('div');
  div.className = 'divider-pill';
  bar.appendChild(div);

  const sorted = [...cities].sort();
  for (const city of sorted) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.city = city;
    chip.textContent = city.length > 8 ? city.slice(0,8) : city.toUpperCase();
    chip.title = city;
    chip.addEventListener('click', () => {
      // Toggle this city
      if (selectedCities.has(city)) {
        selectedCities.delete(city);
        chip.classList.remove('active');
      } else {
        selectedCities.add(city);
        chip.classList.add('active');
        allChip.classList.remove('active');
      }
      if (selectedCities.size === 0) allChip.classList.add('active');
      render();
    });
    bar.appendChild(chip);
  }

  allChip.addEventListener('click', () => {
    selectedCities.clear();
    document.querySelectorAll('#filterBar .chip').forEach(c => c.classList.remove('active'));
    allChip.classList.add('active');
    render();
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const dot = document.getElementById('statusDot');
  try {
    const games = await fetchSaturdayGames();
    dot.className = 'status-dot ready';

    if (!games.length) {
      document.getElementById('main').innerHTML = `<div class="empty-state">No remaining Saturday games found.</div>`;
      return;
    }

    const cities = new Set();
    allGames = [];
    for (const {date, game} of games) {
      const result = buildCard(date, game);
      if (!result) continue;
      cities.add(result.homeCity);
      allGames.push({ date, homeCity: result.homeCity, html: result.html });
    }

    buildFilterChips(cities);
    render();
  } catch(err) {
    dot.className = 'status-dot error';
    document.getElementById('main').innerHTML = `<div class="error-state">⚠ ${err.message}</div>`;
  }
}

init();
</script>
