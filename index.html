<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ PDX → Saturday MLB</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0f;
  --card: #161b22;
  --border: #21262d;
  --accent: #e8c56a;
  --accent2: #5ca8ff;
  --green: #3fb68c;
  --red: #ff5f57;
  --text: #e6edf3;
  --muted: #7d8590;
  --chip: #1c2128;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: #0d1117;
  border-bottom: 1px solid var(--border);
  padding: 10px 12px 8px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  color: var(--accent);
  line-height: 1;
}
.subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.4px;
  margin-top: 1px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  margin-left: auto;
  flex-shrink: 0;
}
.status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
.status-dot.ready { background: var(--green); }
.status-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── FILTER BAR ── */
.filter-hint {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: 0.3px;
}
.filter-hint em { color: var(--accent2); font-style: normal; }
.filter-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-bar {
  display: flex;
  gap: 4px;
  padding-bottom: 2px;
  white-space: nowrap;
  align-items: center;
}
.chip {
  background: var(--chip);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.12s;
  user-select: none;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.chip:active { transform: scale(0.94); }
.chip.active {
  background: #1a3a2a;
  border-color: var(--green);
  color: #fff;
  font-weight: 600;
}
.chip.all.active {
  background: #1a2a3a;
  border-color: var(--accent2);
  color: #fff;
  font-weight: 600;
}
.divider-pill {
  width: 1px; height: 14px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 2px;
}

/* ── MAIN ── */
main { padding: 8px 8px 40px; }

/* ── DATE DIVIDER ── */
.date-divider {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--muted);
  padding: 12px 2px 5px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.date-divider span { color: var(--accent); margin-right: 5px; }

/* ── 3-COLUMN GRID ── */
.games-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  margin-bottom: 2px;
}

/* ── GAME CARD ── */
.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: border-color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.game-card:active { border-color: var(--accent); }

.card-head { padding: 6px 7px 4px; }
.matchup {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.8px;
  line-height: 1;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.4;
}
.card-meta strong { color: var(--text); font-weight: 500; }

.card-flight {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 3px 7px 3px;
  border-top: 1px solid var(--border);
  gap: 3px;
}
.flight-badge {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--accent2);
  white-space: nowrap;
}
.expedia-btn {
  display: inline-flex;
  align-items: center;
  background: var(--accent);
  color: #000;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 4px;
  text-decoration: none;
  white-space: nowrap;
  letter-spacing: 0.2px;
  flex-shrink: 0;
}
.expedia-btn:active { opacity: 0.75; }

.card-timing {
  border-top: 1px solid var(--border);
  padding: 4px 7px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.t-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 2px;
}
.t-label {
  font-family: 'DM Mono', monospace;
  font-size: 7.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.t-val {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  font-weight: 500;
  text-align: right;
  white-space: nowrap;
}
.t-val.y { color: var(--accent); }
.t-val.g { color: var(--green); }
.t-val.r { color: var(--red); }

.card-price {
  border-top: 1px solid var(--border);
  padding: 3px 7px 4px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.p-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}
.p-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: #e6edf3 !important;
  -webkit-text-fill-color: #e6edf3 !important;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  width: 100%;
  outline: none;
  padding: 1px 2px;
  transition: border-color 0.12s;
  opacity: 1;
}
.p-input:focus { border-bottom-color: var(--accent); }
.p-input::placeholder { color: #3a4150; -webkit-text-fill-color: #3a4150; }

.loading-state, .empty-state, .error-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}
.error-state { color: var(--red); }
.game-count {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  padding: 4px 2px 2px;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: #161b22;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  padding: 18px 20px 38px;
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-matchup {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 2px;
}
.modal-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 14px;
}
.modal-timing {
  background: #1c2128;
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.mt-item { display: flex; flex-direction: column; gap: 3px; }
.mt-label { font-family:'DM Mono',monospace; font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.mt-val { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; }
.mt-val.y { color:var(--accent); }
.mt-val.g { color:var(--green); }
.mt-val.r { color:var(--red); }
.modal-expedia-btn {
  display: block;
  background: var(--accent);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1.5px;
  text-align: center;
  padding: 13px 16px;
  border-radius: 12px;
  text-decoration: none;
  margin-bottom: 8px;
  transition: opacity 0.12s;
}
.modal-expedia-btn:active { opacity: 0.8; }
.modal-link-note {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 16px;
}
.modal-close {
  display: block;
  text-align: center;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
}

/* ── DAY SELECTOR ── */
.day-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
}
.day-chip {
  background: var(--chip);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 20px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
  transition: all 0.12s;
}
.day-chip:active { transform: scale(0.94); }
.day-chip.active {
  background: #1a2a3a;
  border-color: var(--accent2);
  color: #fff;
  font-weight: 600;
}

/* ── FILTER PANEL ── */
.filter-panel-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--chip);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.12s;
  margin-left: auto;
}
.filter-panel-btn.has-filters {
  background: #1a3a2a;
  border-color: var(--green);
  color: #fff;
}
.filter-panel-btn:active { opacity: 0.7; }

.fp-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.fp-overlay.open { display: flex; }
.fp-sheet {
  background: #161b22;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  padding: 18px 20px 38px;
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.2s ease;
}
.fp-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.fp-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1.5px;
  color: var(--text);
  margin-bottom: 16px;
}
.fp-group { margin-bottom: 14px; }
.fp-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}
.fp-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.fp-input {
  background: #0a0c0f;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: #e6edf3;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 6px 10px;
  width: 100%;
  outline: none;
  transition: border-color 0.12s;
}
.fp-input:focus { border-color: var(--accent2); }
.fp-input::placeholder { color: #3a4150; }
.fp-sep {
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  flex-shrink: 0;
}
.fp-actions {
  display: flex;
  gap: 8px;
  margin-top: 18px;
}
.fp-apply {
  flex: 1;
  background: var(--green);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  border: none;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: opacity 0.12s;
}
.fp-apply:active { opacity: 0.8; }
.fp-clear {
  background: var(--chip);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: opacity 0.12s;
}
.fp-clear:active { opacity: 0.7; }

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.tab {
  flex: 1;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
  color: var(--muted);
  padding: 8px 4px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── FAVORITES ── */
.fav-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  line-height: 1.8;
}
.fav-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.fav-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
}
.fav-matchup {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1.5px;
  color: var(--text);
}
.fav-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.fav-remove {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--red);
  font-size: 14px;
  padding: 4px 8px;
  cursor: pointer;
  flex-shrink: 0;
}
.fav-timing {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: #1c2128;
}
.fav-t-item { display: flex; flex-direction: column; gap: 2px; }
.fav-t-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.fav-t-val {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
}
.fav-t-val.y { color: var(--accent); }
.fav-t-val.g { color: var(--green); }
.fav-t-val.r { color: var(--red); }
.fav-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px 8px;
  border-top: 1px solid var(--border);
}
.fav-expedia {
  display: inline-flex;
  align-items: center;
  background: var(--accent);
  color: #000;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 6px;
  text-decoration: none;
  white-space: nowrap;
}
.fav-price-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.fav-price-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}
.fav-price-input {
  background: #0a0c0f;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: #e6edf3;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  width: 80px;
  outline: none;
  padding: 3px 6px;
}
.fav-price-input:focus { border-color: var(--accent); }
.fav-price-input::placeholder { color: #3a4150; }

.modal-fav-btn {
  display: block;
  width: 100%;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--chip);
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.15s;
}
.modal-fav-btn.saved {
  background: #2a1a3a;
  border-color: #c084fc;
  color: #c084fc;
}

/* ── SHARED GAMES ── */
.shared-card {
  background: var(--card);
  border: 1px solid #7c3aed44;
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}
.shared-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
}
.shared-matchup {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1.5px;
  color: var(--text);
}
.shared-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.shared-remove {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--red);
  font-size: 14px;
  padding: 4px 8px;
  cursor: pointer;
  flex-shrink: 0;
}
.shared-timing {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: #1c1a2e;
}
.shared-t-item { display: flex; flex-direction: column; gap: 2px; }
.shared-t-label { font-family:'DM Mono',monospace; font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }
.shared-t-val { font-family:'DM Mono',monospace; font-size:10px; font-weight:500; }
.shared-t-val.y { color:var(--accent); }
.shared-t-val.g { color:var(--green); }
.shared-t-val.r { color:var(--red); }
.shared-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px 8px;
  border-top: 1px solid var(--border);
}
.shared-expedia {
  display: inline-flex;
  align-items: center;
  background: var(--accent);
  color: #000;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 6px;
  text-decoration: none;
  white-space: nowrap;
}
.shared-by {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: #9d7ef5;
  margin-left: auto;
  text-align: right;
}
.shared-notes {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text);
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: #141221;
  line-height: 1.5;
  white-space: pre-wrap;
}
.shared-edit {
  background: var(--chip);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: #9d7ef5;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 5px 8px;
  cursor: pointer;
  white-space: nowrap;
}
.modal-shared-btn {
  display: block;
  width: 100%;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--chip);
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.15s;
}
.modal-shared-btn.saved {
  background: #2a1a4a;
  border-color: #7c3aed;
  color: #9d7ef5;
}
.shared-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  line-height: 1.8;
}
.shared-loading {
  text-align: center;
  padding: 30px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-analytics.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWFfe_KqRXg-5orhHU910YPzV5ET6pOcs",
  authDomain: "mlb-games-5f69c.firebaseapp.com",
  projectId: "mlb-games-5f69c",
  storageBucket: "mlb-games-5f69c.appspot.com",
  messagingSenderId: "936760247178",
  appId: "1:936760247178:web:ddc48fb1dc13b2629bbe73",
  measurementId: "G-0XGY8WW9PQ"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getFirestore(app);
window.db = db;
window.firestoreFns = { collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc };
</script>

<script>
// ─── SHARED CACHE ─────────────────────────────
let sharedGamesCache = [];
let currentModalGame = null;

// ─── LOAD SHARED ─────────────────────────────
async function getSharedGames() {
  const { collection, getDocs, query, orderBy } = window.firestoreFns;
  const q = query(collection(window.db, 'sharedGames'), orderBy('sharedAt','desc'));
  const snap = await getDocs(q);
  sharedGamesCache = snap.docs.map(d => ({ fbId: d.id, ...d.data() }));
}

// ─── CHECK SHARED ────────────────────────────
function isShared(gameId){
  return sharedGamesCache.some(g => g.gameId === String(gameId));
}

// ─── SHARE (UPDATED) ─────────────────────────
async function toggleShared(){
  if (!currentModalGame) return;
  const gameId = String(currentModalGame.gameId);

  const existing = sharedGamesCache.find(g => g.gameId === gameId);

  if (existing){
    const { deleteDoc, doc } = window.firestoreFns;
    await deleteDoc(doc(window.db,'sharedGames', existing.fbId));
    sharedGamesCache = sharedGamesCache.filter(g => g.gameId !== gameId);
  } else {
    const sharedBy = prompt("Shared by:");
    if (!sharedBy) return;

    const notes = prompt("Notes (optional):") || "";

    const { addDoc, collection } = window.firestoreFns;

    const data = {
      ...currentModalGame,
      gameId,
      sharedBy: sharedBy.trim(),
      notes: notes.trim(),
      sharedAt: Date.now()
    };

    const ref = await addDoc(collection(window.db,'sharedGames'), data);
    sharedGamesCache.unshift({ fbId: ref.id, ...data });
  }

  updateSharedTab();
  renderShared();
}

// ─── EDIT SHARED ─────────────────────────────
async function editShared(fbId){
  const game = sharedGamesCache.find(g => g.fbId === fbId);
  if (!game) return;

  const sharedBy = prompt("Shared by:", game.sharedBy || "");
  if (!sharedBy) return;

  const notes = prompt("Notes:", game.notes || "") || "";

  const { updateDoc, doc } = window.firestoreFns;

  await updateDoc(doc(window.db,'sharedGames',fbId),{
    sharedBy: sharedBy.trim(),
    notes: notes.trim()
  });

  game.sharedBy = sharedBy.trim();
  game.notes = notes.trim();

  renderShared();
}

// ─── REMOVE ──────────────────────────────────
async function removeShared(fbId){
  const { deleteDoc, doc } = window.firestoreFns;
  await deleteDoc(doc(window.db,'sharedGames',fbId));
  sharedGamesCache = sharedGamesCache.filter(g => g.fbId !== fbId);
  renderShared();
  updateSharedTab();
}

// ─── TAB COUNT ───────────────────────────────
function updateSharedTab(){
  const el = document.getElementById("tabShared");
  const count = sharedGamesCache.length;
  el.textContent = count ? `🔗 SHARED (${count})` : "🔗 SHARED";
}

// ─── RENDER SHARED ───────────────────────────
function renderShared(){
  const el = document.getElementById("sharedContent");

  if (!sharedGamesCache.length){
    el.innerHTML = `<div class="shared-empty">No shared games yet.</div>`;
    return;
  }

  el.innerHTML = sharedGamesCache.map(f => `
    <div class="shared-card">
      <div class="shared-head">
        <div>
          <div class="shared-matchup">${f.matchup}</div>
          <div class="shared-meta">${f.dateLabel}</div>
        </div>
        <button class="shared-remove" onclick="removeShared('${f.fbId}')">✕</button>
      </div>

      ${f.notes ? `<div class="shared-notes">${f.notes}</div>` : ""}

      <div class="shared-footer">
        <button class="shared-edit" onclick="editShared('${f.fbId}')">EDIT</button>
        <span class="shared-by">
          ${f.sharedBy || "Unknown"} · ${new Date(f.sharedAt).toLocaleDateString()}
        </span>
      </div>
    </div>
  `).join("");
}

// ─── INIT SHARED ─────────────────────────────
async function initShared(){
  await getSharedGames();
  updateSharedTab();
}

initShared();
</script>

<!-- FAVORITES + SHARED VIEWS -->

<div id="sharedView" style="display:none; padding:10px;">
  <div id="sharedContent"></div>
</div>

</body>
